name: Build MEPlayer

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: D:/vcpkg
          key: vcpkg-clone-20260711

      - name: Setup vcpkg (clone if not cached)
        shell: pwsh
        run: |
          # VS 内置 vcpkg 非 git 仓库，无法取 HEAD SHA，且版本与硬编码 baseline 不匹配。
          # 这里 clone 一份独立 vcpkg，完全控制版本，baseline 用 clone 的 HEAD SHA。
          $vcpkgDir = "D:/vcpkg"
          $needClone = -not (Test-Path "$vcpkgDir/.git")
          if ($needClone) {
            if (Test-Path $vcpkgDir) { Remove-Item $vcpkgDir -Recurse -Force }
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgDir
          }
          if (-not (Test-Path "$vcpkgDir/vcpkg.exe")) {
            & "$vcpkgDir/bootstrap-vcpkg.bat" -disableMetrics 2>&1 | Out-Null
          }
          # 取 HEAD SHA，写入 vcpkg.json 的 builtin-baseline
          $sha = (& git -C $vcpkgDir rev-parse HEAD).Trim()
          if (-not $sha) { throw "无法获取 vcpkg HEAD SHA" }
          Write-Host "vcpkg HEAD SHA: $sha"
          $json = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $json."builtin-baseline" = $sha
          $json | ConvertTo-Json -Depth 10 | Set-Content vcpkg.json -Encoding UTF8
          Write-Host "===== 更新后的 vcpkg.json ====="
          Get-Content vcpkg.json
          # 暴露给后续步骤
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgDir" -Encoding ascii

      - name: Download mpv-dev (latest)
        shell: pwsh
        run: |
          # 查询 shinchiro/mpv-winbuild-cmake 的最新 release，取 mpv-dev-x86_64 资源
          $repo = "shinchiro/mpv-winbuild-cmake"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" `
            -Headers @{ "User-Agent" = "github-actions" }
          # 排除 v3 变体，取标准 x86_64
          $asset = $release.assets | Where-Object {
            $_.name -like "mpv-dev-x86_64-*.7z" -and $_.name -notlike "*-v3-*"
          } | Select-Object -First 1
          if (-not $asset) { throw "未找到 mpv-dev-x86_64 资源" }
          Write-Host "下载: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev-extract -y

          Write-Host "===== 解压后文件列表 ====="
          Get-ChildItem mpv-dev-extract -Recurse | Select-Object FullName

          # 拷贝到 third_party/mpv/
          New-Item -ItemType Directory -Force -Path third_party/mpv/include/mpv
          # 头文件
          Get-ChildItem mpv-dev-extract -Recurse -Filter "*.h" |
            Where-Object { $_.DirectoryName -like "*\mpv" } |
            ForEach-Object { Copy-Item $_.FullName third_party/mpv/include/mpv/ }
          # dll（运行时依赖，注意 shinchiro 的 dll 名为 libmpv-2.dll）
          Get-ChildItem mpv-dev-extract -Recurse -Filter "*.dll" |
            ForEach-Object { Copy-Item $_.FullName third_party/mpv/ }

          Write-Host "===== third_party/mpv 结构 ====="
          Get-ChildItem third_party/mpv -Recurse | Select-Object FullName

      - name: Generate mpv.lib from dll exports
        shell: pwsh
        run: |
          # shinchiro 的 mpv-dev 包不含 MSVC import library（mpv.lib）也不含 .def，
          # 只有 MinGW 的 libmpv.dll.a 和 libmpv-2.dll。
          # 用 dumpbin 从 dll 导出符号 → 生成 .def → lib.exe 生成 mpv.lib
          Push-Location third_party/mpv

          # 找到 dll（名为 libmpv-2.dll 或 mpv-2.dll）
          $dll = Get-ChildItem -Filter "*.dll" | Select-Object -First 1
          if (-not $dll) { throw "未找到 mpv dll" }
          $dllName = $dll.Name
          Write-Host "使用 dll: $dllName"

          # 1. dumpbin 导出符号 → 构造 .def
          Write-Host "从 $dllName 导出符号..."
          $exports = & dumpbin /exports $dllName
          # 解析输出：找到 "ordinal" 表头后的行，格式: [1] 0 func_name
          # 注意：表头行后紧跟一个空行，再才是数据行，不能把这个空行当作表结束标志，
          # 否则会在读到任何数据前就 break，导致导出符号数为 0。
          $lines = $exports -split "`r?`n"
          $inTable = $false
          $funcNames = @()
          foreach ($line in $lines) {
            if ($line -match "ordinal") { $inTable = $true; continue }
            if (-not $inTable) { continue }
            # 空行：表头后的空行要跳过继续找数据行；只有在已经收集到符号之后
            # 出现的空行，才代表数据表真正结束。
            if ($line -match "^\s*$") {
              if ($funcNames.Count -gt 0) { break } else { continue }
            }
            if ($line -match "Summary") { break }
            # 匹配: "        1    0 00001000 mpv_create"
            if ($line -match "^\s*\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)") {
              $funcNames += $matches[1]
            }
          }
          Write-Host "导出符号数: $($funcNames.Count)"

          # 2. 写 .def
          $defContent = "LIBRARY `"$dllName`"`r`nEXPORTS`r`n"
          foreach ($name in $funcNames) { $defContent += "  $name`r`n" }
          Set-Content -Path mpv.def -Value $defContent -Encoding ASCII
          Write-Host "===== mpv.def 前 10 行 ====="
          Get-Content mpv.def | Select-Object -First 10

          # 3. lib.exe 生成 mpv.lib
          Write-Host "生成 mpv.lib ..."
          & lib /def:mpv.def /name:$dllName /out:mpv.lib /MACHINE:X64
          if ($LASTEXITCODE -ne 0) { throw "lib.exe 生成 mpv.lib 失败" }

          Write-Host "===== 生成后 third_party/mpv 结构 ====="
          Get-ChildItem | Select-Object Name, Length
          Pop-Location

      - name: Configure CMake
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
            throw "vcpkg toolchain 未找到: $toolchain`nVCPKG_ROOT=$env:VCPKG_ROOT"
          }
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE" `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE --parallel

      - name: Prepare artifact
        shell: pwsh
        run: |
          $out = "MEPlayer-release"
          New-Item -ItemType Directory -Force -Path $out
          # 主程序（尝试多个可能路径）
          $exe = "build/Release/MEPlayer.exe"
          if (-not (Test-Path $exe)) { $exe = "build/$env:BUILD_TYPE/MEPlayer.exe" }
          if (-not (Test-Path $exe)) {
            $found = Get-ChildItem build -Recurse -Filter "MEPlayer.exe" | Select-Object -First 1
            if ($found) { $exe = $found.FullName }
          }
          if (-not (Test-Path $exe)) { throw "未找到 MEPlayer.exe" }
          Copy-Item $exe $out/
          # mpv 运行时（拷贝所有 dll，shinchiro 的名为 libmpv-2.dll）
          Copy-Item third_party/mpv/*.dll $out/ -ErrorAction SilentlyContinue
          # vcpkg 动态库依赖（manifest 模式装到 build/vcpkg_installed/）
          $vcpkgBin = @("build/vcpkg_installed/x64-windows/bin", "vcpkg_installed/x64-windows/bin")
          foreach ($p in $vcpkgBin) {
            if (Test-Path $p) {
              Copy-Item "$p/*.dll" $out/ -ErrorAction SilentlyContinue
              break
            }
          }
          # 资源
          New-Item -ItemType Directory -Force -Path $out/assets/icons
          Copy-Item assets/icons/app_icon.ico $out/assets/icons/
          Copy-Item assets/icons/app_icon.png $out/assets/icons/
          # appdata 占位目录
          New-Item -ItemType Directory -Force -Path $out/appdata/thumbnails
          Write-Host "===== 产物目录 ====="
          Get-ChildItem $out -Recurse | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEPlayer-windows-x64
          path: MEPlayer-release/
          if-no-files-found: error

      - name: Package zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path MEPlayer-release/* -DestinationPath MEPlayer-${{ github.ref_name }}-windows-x64.zip

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MEPlayer-${{ github.ref_name }}-windows-x64.zip
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
